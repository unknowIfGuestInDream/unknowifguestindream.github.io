name: Deploy blog
on:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "CONTRIBUTORS.md"
      - "README.md"
      - ".prettierignore"
      - "LICENSE"
      - ".markdownlint-cli2.mjs"
      - ".gitignore"
      - ".gitattributes"
      - ".mergify.yml"

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Deps
        run: npm ci

      - name: Build Blog
        env:
          NODE_OPTIONS: --max_old_space_size=4096
        run: npm run build:vite

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 文档部署到的分支名称
          branch: gh-pages
          folder: dist
